<!doctype html>
<html lang="en-IN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 — Page Not Found | Voltaire Tech</title>
  <meta name="theme-color" content="#E63946" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter Tight', -apple-system, sans-serif;
      background: #F5F5F0;
      color: #0A0A0A;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 520px; }
    .code {
      font-size: clamp(4rem, 15vw, 8rem);
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 1;
      margin-bottom: 0.5rem;
    }
    .code span { color: #E63946; }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 1rem;
    }
    p {
      color: #555;
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    a.btn {
      display: inline-block;
      background: #E63946;
      color: #F5F5F0;
      padding: 14px 32px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.95rem;
      transition: background 0.2s, transform 0.15s;
    }
    a.btn:hover { background: #C42E3A; transform: translateY(-2px); }
    a.btn:active { transform: scale(0.98); }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">4<span>0</span>4</div>
    <h1>Page not found.</h1>
    <p>The page you're looking for doesn't exist or has been moved. Let's get you back to building.</p>
    <a class="btn" href="/">← Back to Voltaire Tech</a>
  </div>
</body>
</html>
